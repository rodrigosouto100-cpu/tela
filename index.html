<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SecureCam Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#080a0e;--accent:#00e5ff;--red:#ff4444;--text:#c8d4e0;--dim:#4a5568;--mono:'Share Tech Mono',monospace}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:var(--mono);color:var(--text)}
.screen{display:none;width:100%;height:100vh;align-items:center;justify-content:center;flex-direction:column}
.screen.active{display:flex}

#login{padding:28px 24px;background:radial-gradient(ellipse 70% 50% at 70% 20%,rgba(0,229,255,.06),transparent 70%),radial-gradient(ellipse 50% 60% at 20% 80%,rgba(255,68,68,.04),transparent 70%),#080a0e}
.logo{display:flex;flex-direction:column;align-items:center;margin-bottom:36px}
.logo-icon{width:68px;height:68px;border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:14px;box-shadow:0 0 30px rgba(0,229,255,.15);animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 20px rgba(0,229,255,.1)}50%{box-shadow:0 0 40px rgba(0,229,255,.25)}}
.logo-title{font-size:22px;letter-spacing:5px;color:#fff;margin-bottom:4px}
.logo-sub{font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.form{width:100%;max-width:340px;display:flex;flex-direction:column}
.lbl{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:7px}
input{width:100%;padding:13px 16px;background:#0f1318;border:1px solid #1e2530;border-radius:9px;color:#fff;font-family:var(--mono);font-size:15px;letter-spacing:1px;outline:none;margin-bottom:18px;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:rgba(0,229,255,.35);box-shadow:0 0 0 3px rgba(0,229,255,.07)}
input::placeholder{color:var(--dim);font-size:13px}
.btn{padding:15px;border-radius:10px;border:none;background:var(--accent);color:#000;font-family:var(--mono);font-size:14px;letter-spacing:2px;cursor:pointer;margin-top:6px;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98);opacity:.85}
.err{font-size:12px;color:var(--red);text-align:center;margin-top:12px;min-height:18px;letter-spacing:1px}
.info{font-size:11px;color:var(--dim);text-align:center;margin-top:8px}

#viewer{background:#000;position:relative;align-items:stretch}
#rvideo{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
.hud{position:absolute;inset:0;pointer-events:none;z-index:5}
.hud-top{position:absolute;top:0;left:0;right:0;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent)}
.hud-title{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.4)}
.live-badge{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.3)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);opacity:0;transition:opacity .3s}
.live-dot.on{opacity:1;animation:live 1.5s ease-in-out infinite}
@keyframes live{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
#sovl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 22px;font-size:13px;letter-spacing:1px;color:var(--text);text-align:center;backdrop-filter:blur(10px);z-index:10;pointer-events:none;transition:opacity .4s}
#sovl.hidden{opacity:0;pointer-events:none}
.hud-bottom{position:absolute;bottom:0;left:0;right:0;padding:0 20px 36px;display:flex;align-items:center;justify-content:center;gap:14px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);pointer-events:all;transition:opacity .5s}
.hud-bottom.hidden{opacity:0;pointer-events:none}
.ctrl{display:flex;flex-direction:column;align-items:center;gap:6px;padding:11px 16px;border-radius:12px;cursor:pointer;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);transition:all .15s;min-width:70px}
.ctrl:active{background:rgba(255,255,255,.2);transform:scale(.95)}
.ctrl.active{background:rgba(0,229,255,.12);border-color:rgba(0,229,255,.3)}
.ctrl-icon{font-size:22px;line-height:1}
.ctrl-label{font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.4);text-transform:uppercase}
#taphint{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.15);z-index:10;pointer-events:none;opacity:0;transition:opacity .5s;text-transform:uppercase}
#taphint.show{opacity:1}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:7px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="login" class="screen active">
  <div class="logo">
    <div class="logo-icon">📺</div>
    <div class="logo-title">SECURECAM</div>
    <div class="logo-sub">Viewer</div>
  </div>
  <div class="form">
    <div class="lbl">ID da sala</div>
    <input id="iRoom" type="text" placeholder="ex: minha-casa" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="lbl">Senha</div>
    <input id="iPass" type="password" placeholder="senha de acesso">
    <button class="btn" onclick="connect()">CONECTAR →</button>
    <div class="err" id="err"></div>
    <div class="info" id="info"></div>
  </div>
</div>

<div id="viewer" class="screen">
  <video id="rvideo" autoplay playsinline></video>
  <div class="hud">
    <div class="hud-top">
      <span class="hud-title">SECURECAM</span>
      <div class="live-badge">
        <div class="live-dot" id="ldot"></div>
        <span id="llabel">OFFLINE</span>
      </div>
    </div>
    <div id="sovl"><span class="spin"></span>Aguardando câmera...</div>
    <div id="taphint">TOQUE PARA CONTROLES</div>
    <div class="hud-bottom" id="hbot">
      <div class="ctrl" onclick="cmdSwitch()">
        <span class="ctrl-icon">🔄</span>
        <span class="ctrl-label">Câmera</span>
      </div>
      <div class="ctrl" id="mctrl" onclick="toggleMute()">
        <span class="ctrl-icon" id="micon">🔊</span>
        <span class="ctrl-label">Áudio</span>
      </div>
      <div class="ctrl" onclick="goFS()">
        <span class="ctrl-icon" id="fsicon">⛶</span>
        <span class="ctrl-label">Fullscreen</span>
      </div>
      <div class="ctrl" onclick="goBack()">
        <span class="ctrl-icon">⚙️</span>
        <span class="ctrl-label">Sair</span>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ── Hash idêntico ao CameraService.kt ──
function djb2(str){
  let h=5381n;
  for(const c of str) h=((h<<5n)+h+BigInt(c.charCodeAt(0)))&0xFFFFFFFFn;
  return String(h%100000n).padStart(5,'0');
}
function buildPeerId(room,pass){
  const clean=room.toLowerCase().replace(/[^a-z0-9]/g,'');
  return `sc-${clean}-${djb2(`${room}:${pass}`)}`;
}

let peer=null, dataConn=null, call=null;
let muted=false, streaming=false, active=false;
let ctTimer=null, rcTimer=null, camId='';

// FIX 2: tempo mínimo antes de reconectar (evita loop de reconexão)
const RC_DELAY = 6000;

const sr=localStorage.getItem('sc-room')||'';
const sp=localStorage.getItem('sc-pass')||'';
document.getElementById('iRoom').value=sr;
document.getElementById('iPass').value=sp;
if(sr) document.getElementById('info').textContent=`✓ ID salvo: ${sr}`;

function connect(){
  const room=document.getElementById('iRoom').value.trim();
  const pass=document.getElementById('iPass').value.trim();
  if(!room) return showErr('Digite o ID da sala');
  if(!pass)  return showErr('Digite a senha');
  localStorage.setItem('sc-room',room);
  localStorage.setItem('sc-pass',pass);
  camId=buildPeerId(room,pass);
  active=true;
  show('viewer');
  setStatus('<span class="spin"></span>Conectando...');
  setLive(false);
  document.getElementById('viewer').addEventListener('click',onTap);
  initPeer();
}

function initPeer(){
  clearTimeout(rcTimer);
  if(peer&&!peer.destroyed){try{peer.destroy()}catch(e){}}
  peer=new Peer({debug:0});
  peer.on('open',()=>{
    setStatus('<span class="spin"></span>Localizando câmera...');
    callCam();
    openData();
  });
  // FIX 2: atraso maior antes de reconectar
  peer.on('error',e=>{
    console.warn('peer err',e.type);
    setLive(false);
    streaming=false;
    setStatus('<span class="spin"></span>Reconectando...');
    if(active) rcTimer=setTimeout(initPeer, RC_DELAY);
  });
  peer.on('disconnected',()=>{
    setLive(false);
    streaming=false;
    setStatus('<span class="spin"></span>Reconectando...');
    if(active) rcTimer=setTimeout(initPeer, RC_DELAY);
  });
}

function callCam(){
  const canvas=document.createElement('canvas');
  canvas.width=2; canvas.height=2;
  const dummy=canvas.captureStream(1);
  const c=peer.call(camId,dummy);
  if(!c){
    setStatus('<span class="spin"></span>Câmera não encontrada...');
    if(active) rcTimer=setTimeout(callCam, RC_DELAY);
    return;
  }
  call=c;
  c.on('stream',s=>{
    const v=document.getElementById('rvideo');
    v.srcObject=s; v.muted=muted; v.play().catch(()=>{});
    setStatus(''); setLive(true); streaming=true;
    scheduleHide();
  });
  // FIX 2: atraso antes de tentar reconectar após queda
  c.on('close',()=>{
    setLive(false); streaming=false;
    setStatus('<span class="spin"></span>Câmera desconectada...');
    if(active) rcTimer=setTimeout(callCam, RC_DELAY);
  });
  c.on('error',()=>{
    setLive(false); streaming=false;
    if(active) rcTimer=setTimeout(callCam, RC_DELAY);
  });
}

function openData(){
  const c=peer.connect(camId,{reliable:true});
  c.on('open',()=>{ dataConn=c; });
  c.on('close',()=>{ dataConn=null; if(active) setTimeout(openData,8000); });
  c.on('error',()=>{ dataConn=null; if(active) setTimeout(openData,8000); });
}

function cmdSwitch(){
  if(dataConn&&dataConn.open) dataConn.send('switchCamera');
  else console.warn('DataChannel não disponível');
}

function toggleMute(){
  muted=!muted;
  const v=document.getElementById('rvideo'); if(v) v.muted=muted;
  document.getElementById('micon').textContent=muted?'🔇':'🔊';
  document.getElementById('mctrl').classList.toggle('active',muted);
}

function goFS(){
  const el=document.getElementById('viewer');
  if(!document.fullscreenElement){
    (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
    document.getElementById('fsicon').textContent='✕';
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    document.getElementById('fsicon').textContent='⛶';
  }
}

function goBack(){
  active=false;
  clearTimeout(rcTimer); clearTimeout(ctTimer);
  try{call?.close()}catch(e){}
  try{dataConn?.close()}catch(e){}
  try{if(peer&&!peer.destroyed)peer.destroy()}catch(e){}
  call=null; dataConn=null; peer=null; streaming=false;
  document.getElementById('rvideo').srcObject=null;
  setLive(false);
  document.getElementById('viewer').removeEventListener('click',onTap);
  show('login');
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setStatus(html){
  const e=document.getElementById('sovl');
  if(html){e.innerHTML=html;e.classList.remove('hidden')}
  else e.classList.add('hidden');
}
function setLive(on){
  document.getElementById('ldot').classList.toggle('on',on);
  document.getElementById('llabel').textContent=on?'AO VIVO':'OFFLINE';
}
function showErr(msg){
  const e=document.getElementById('err');
  e.textContent=msg;
  setTimeout(()=>e.textContent='',3000);
}
function onTap(){
  if(!streaming)return;
  clearTimeout(ctTimer);
  document.getElementById('hbot').classList.remove('hidden');
  document.getElementById('taphint').classList.remove('show');
  scheduleHide();
}
function scheduleHide(){
  clearTimeout(ctTimer);
  ctTimer=setTimeout(()=>{
    document.getElementById('hbot').classList.add('hidden');
    document.getElementById('taphint').classList.add('show');
  },4000);
}

document.getElementById('iRoom').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('iPass').focus()});
document.getElementById('iPass').addEventListener('keydown',e=>{if(e.key==='Enter')connect()});
</script>
</body>
</html>
