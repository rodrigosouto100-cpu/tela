<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SecureCam Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #080a0e; --surface: rgba(0,0,0,0.7); --accent: #00e5ff;
  --red: #ff4444; --green: #00ff88; --text: #c8d4e0; --dim: #4a5568;
  --mono: 'Share Tech Mono', monospace;
}
html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; font-family:var(--mono); color:var(--text); }

/* ── TELAS ── */
.screen { display:none; width:100%; height:100vh; align-items:center; justify-content:center; flex-direction:column; }
.screen.active { display:flex; }

/* ── LOGIN ── */
#login {
  padding:28px 24px; gap:0;
  background: radial-gradient(ellipse 70% 50% at 70% 20%, rgba(0,229,255,0.06), transparent 70%),
              radial-gradient(ellipse 50% 60% at 20% 80%, rgba(255,68,68,0.04), transparent 70%), #080a0e;
}
.logo { display:flex; flex-direction:column; align-items:center; margin-bottom:36px; }
.logo-icon { width:68px; height:68px; border-radius:50%; border:1.5px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size:30px; margin-bottom:14px; box-shadow:0 0 30px rgba(0,229,255,0.15); position:relative; animation:breathe 3s ease-in-out infinite; }
@keyframes breathe { 0%,100% { box-shadow:0 0 20px rgba(0,229,255,0.1); } 50% { box-shadow:0 0 40px rgba(0,229,255,0.25); } }
.logo-title { font-size:22px; letter-spacing:5px; color:#fff; margin-bottom:4px; }
.logo-sub { font-size:11px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }
.form { width:100%; max-width:340px; display:flex; flex-direction:column; }
.field-label { font-size:10px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; margin-bottom:7px; }
input {
  width:100%; padding:13px 16px; background:#0f1318; border:1px solid #1e2530;
  border-radius:9px; color:#fff; font-family:var(--mono); font-size:15px; letter-spacing:1px;
  outline:none; margin-bottom:18px; transition:border-color .2s, box-shadow .2s;
}
input:focus { border-color:rgba(0,229,255,.35); box-shadow:0 0 0 3px rgba(0,229,255,.07); }
input::placeholder { color:var(--dim); font-size:13px; letter-spacing:1px; }
.connect-btn {
  padding:15px; border-radius:10px; border:none; background:var(--accent);
  color:#000; font-family:var(--mono); font-size:14px; letter-spacing:2px;
  cursor:pointer; margin-top:6px; transition:opacity .15s, transform .1s;
}
.connect-btn:active { transform:scale(.98); opacity:.85; }
.login-error { font-size:12px; color:var(--red); text-align:center; margin-top:12px; min-height:18px; letter-spacing:1px; }
.saved-info { font-size:11px; color:var(--dim); text-align:center; margin-top:8px; }

/* ── VIEWER ── */
#viewer { background:#000; position:relative; align-items:stretch; }
#remote-video { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#000; }

/* HUD */
.hud { position:absolute; inset:0; pointer-events:none; z-index:5; }

.hud-top {
  position:absolute; top:0; left:0; right:0; padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(to bottom, rgba(0,0,0,.75) 0%, transparent 100%);
}
.hud-title { font-size:12px; letter-spacing:3px; color:rgba(255,255,255,.4); }
.live-badge { display:flex; align-items:center; gap:7px; font-size:11px; letter-spacing:2px; color:rgba(255,255,255,.3); }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--red); opacity:0; transition:opacity .3s; }
.live-dot.on { opacity:1; animation:live 1.5s ease-in-out infinite; }
@keyframes live { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.3; transform:scale(.8); } }

/* Status central */
#status-overlay {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,.8); border:1px solid rgba(255,255,255,.08);
  border-radius:12px; padding:16px 22px; font-size:13px; letter-spacing:1px;
  color:var(--text); text-align:center; backdrop-filter:blur(10px); z-index:10;
  pointer-events:none; transition:opacity .4s;
}
#status-overlay.hidden { opacity:0; }

/* Controles */
.hud-bottom {
  position:absolute; bottom:0; left:0; right:0;
  padding:0 20px 36px; display:flex; align-items:center; justify-content:center; gap:14px;
  background:linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 100%);
  pointer-events:all; transition:opacity .5s;
}
.hud-bottom.hidden { opacity:0; pointer-events:none; }

.ctrl {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:11px 16px; border-radius:12px; cursor:pointer;
  background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(10px); transition:all .15s; min-width:72px;
}
.ctrl:active { background:rgba(255,255,255,.2); transform:scale(.95); }
.ctrl.active { background:rgba(0,229,255,.12); border-color:rgba(0,229,255,.3); }
.ctrl-icon { font-size:22px; line-height:1; }
.ctrl-label { font-size:10px; letter-spacing:1px; color:rgba(255,255,255,.4); text-transform:uppercase; }

/* Tap hint */
#tap-hint {
  position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:2px; color:rgba(255,255,255,.15);
  z-index:10; pointer-events:none; opacity:0; transition:opacity .5s; text-transform:uppercase;
}
#tap-hint.show { opacity:1; }

/* Spinner */
.spin { display:inline-block; width:11px; height:11px; border:2px solid rgba(255,255,255,.2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-right:7px; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="login" class="screen active">
  <div class="logo">
    <div class="logo-icon">📺</div>
    <div class="logo-title">SECURECAM</div>
    <div class="logo-sub">Viewer</div>
  </div>

  <div class="form">
    <div class="field-label">ID da sala</div>
    <input id="inp-room" type="text" placeholder="ex: minha-casa" autocomplete="off" autocorrect="off" spellcheck="false">

    <div class="field-label">Senha</div>
    <input id="inp-pass" type="password" placeholder="senha de acesso">

    <button class="connect-btn" onclick="connect()">CONECTAR →</button>
    <div class="login-error" id="login-error"></div>
    <div class="saved-info" id="saved-info"></div>
  </div>
</div>

<!-- ══════════ VIEWER ══════════ -->
<div id="viewer" class="screen">
  <video id="remote-video" autoplay playsinline></video>

  <div class="hud">
    <!-- Topo -->
    <div class="hud-top">
      <span class="hud-title">SECURECAM</span>
      <div class="live-badge">
        <div class="live-dot" id="live-dot"></div>
        <span id="live-label">OFFLINE</span>
      </div>
    </div>

    <!-- Status central -->
    <div id="status-overlay"><span class="spin"></span>Aguardando câmera...</div>

    <!-- Tap hint -->
    <div id="tap-hint">TOQUE PARA CONTROLES</div>

    <!-- Controles -->
    <div class="hud-bottom" id="hud-bottom">
      <div class="ctrl" onclick="cmdSwitchCamera()">
        <span class="ctrl-icon">🔄</span>
        <span class="ctrl-label">Câmera</span>
      </div>
      <div class="ctrl" id="mute-ctrl" onclick="toggleMute()">
        <span class="ctrl-icon" id="mute-icon">🔊</span>
        <span class="ctrl-label">Áudio</span>
      </div>
      <div class="ctrl" onclick="fullscreen()">
        <span class="ctrl-icon" id="fs-icon">⛶</span>
        <span class="ctrl-label">Tela cheia</span>
      </div>
      <div class="ctrl" onclick="goBack()">
        <span class="ctrl-icon">⚙️</span>
        <span class="ctrl-label">Sair</span>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ════════════════════════════════════════
//  HASH — idêntico ao CameraService.kt
// ════════════════════════════════════════
function djb2Hash(str) {
  let hash = 5381n;
  for (const ch of str) {
    hash = ((hash << 5n) + hash + BigInt(ch.charCodeAt(0))) & 0xFFFFFFFFn;
  }
  return String(hash % 100000n).padStart(5, '0');
}

function buildPeerId(room, password) {
  const clean = room.toLowerCase().replace(/[^a-z0-9]/g, '');
  const hash = djb2Hash(`${room}:${password}`);
  return `sc-${clean}-${hash}`;
}

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let peer = null;
let dataConn = null;
let mediaCall = null;
let isMuted = false;
let streaming = false;
let controlsTimer = null;
let reconnectTimer = null;
let cameraId = '';
let running = false;

// Restaura valores salvos
const savedRoom = localStorage.getItem('sc-room') || '';
const savedPass  = localStorage.getItem('sc-pass')  || '';
document.getElementById('inp-room').value = savedRoom;
document.getElementById('inp-pass').value = savedPass;
if (savedRoom) {
  document.getElementById('saved-info').textContent = `✓ ID salvo: ${savedRoom}`;
}

// ════════════════════════════════════════
//  CONEXÃO
// ════════════════════════════════════════
function connect() {
  const room = document.getElementById('inp-room').value.trim();
  const pass  = document.getElementById('inp-pass').value.trim();

  if (!room) return showLoginError('Digite o ID da sala');
  if (!pass)  return showLoginError('Digite a senha');

  localStorage.setItem('sc-room', room);
  localStorage.setItem('sc-pass', pass);

  cameraId = buildPeerId(room, pass);

  showScreen('viewer');
  setStatus('<span class="spin"></span>Conectando ao servidor...');
  setLive(false);
  running = true;

  document.getElementById('viewer').addEventListener('click', handleViewerTap);

  initPeer();
}

function initPeer() {
  clearTimeout(reconnectTimer);
  if (peer && !peer.destroyed) {
    try { peer.destroy(); } catch(e) {}
  }

  peer = new Peer({ debug: 0 });

  peer.on('open', () => {
    setStatus('<span class="spin"></span>Localizando câmera...');
    callCamera();
    openDataChannel();
  });

  peer.on('error', err => {
    console.warn('PeerJS error:', err.type, err.message);
    setStatus(`<span class="spin"></span>Reconectando...`);
    setLive(false);
    streaming = false;
    if (running) reconnectTimer = setTimeout(initPeer, 4000);
  });

  peer.on('disconnected', () => {
    setLive(false);
    streaming = false;
    setStatus('<span class="spin"></span>Reconectando...');
    if (running) reconnectTimer = setTimeout(initPeer, 4000);
  });
}

// ── Conexão de mídia (recebe o vídeo) ─────────────────────────
function callCamera() {
  // Stream dummy para o PeerJS (câmera Android só envia, não recebe)
  const canvas = document.createElement('canvas');
  canvas.width = 2; canvas.height = 2;
  const dummy = canvas.captureStream(1);

  const call = peer.call(cameraId, dummy);
  if (!call) {
    setStatus('<span class="spin"></span>Câmera não encontrada, tentando...');
    if (running) reconnectTimer = setTimeout(callCamera, 4000);
    return;
  }

  mediaCall = call;

  call.on('stream', stream => {
    const video = document.getElementById('remote-video');
    video.srcObject = stream;
    video.muted = isMuted;
    video.play().catch(() => {});
    setStatus('');
    setLive(true);
    streaming = true;
    scheduleHideControls();
  });

  call.on('close', () => {
    setLive(false);
    streaming = false;
    setStatus('<span class="spin"></span>Câmera desconectada...');
    if (running) reconnectTimer = setTimeout(callCamera, 4000);
  });

  call.on('error', () => {
    setLive(false);
    streaming = false;
    if (running) reconnectTimer = setTimeout(callCamera, 4000);
  });
}

// ── Conexão de dados (envia comandos) ─────────────────────────
function openDataChannel() {
  const conn = peer.connect(cameraId, { reliable: true });

  conn.on('open', () => {
    dataConn = conn;
    console.log('DataChannel aberto');
  });

  conn.on('close', () => {
    dataConn = null;
    if (running) setTimeout(openDataChannel, 5000);
  });

  conn.on('error', () => {
    dataConn = null;
    if (running) setTimeout(openDataChannel, 5000);
  });
}

// ════════════════════════════════════════
//  COMANDOS
// ════════════════════════════════════════
function cmdSwitchCamera() {
  if (dataConn && dataConn.open) {
    dataConn.send('switchCamera');
  } else {
    console.warn('DataChannel não disponível');
  }
}

function toggleMute() {
  isMuted = !isMuted;
  const video = document.getElementById('remote-video');
  if (video) video.muted = isMuted;
  document.getElementById('mute-icon').textContent = isMuted ? '🔇' : '🔊';
  document.getElementById('mute-ctrl').classList.toggle('active', isMuted);
}

function fullscreen() {
  const el = document.getElementById('viewer');
  if (!document.fullscreenElement) {
    el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
    document.getElementById('fs-icon').textContent = '✕';
  } else {
    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
    document.getElementById('fs-icon').textContent = '⛶';
  }
}

function goBack() {
  running = false;
  clearTimeout(reconnectTimer);
  clearTimeout(controlsTimer);
  if (mediaCall) { try { mediaCall.close(); } catch(e) {} mediaCall = null; }
  if (dataConn)  { try { dataConn.close(); }  catch(e) {} dataConn = null; }
  if (peer && !peer.destroyed) { try { peer.destroy(); } catch(e) {} peer = null; }
  const video = document.getElementById('remote-video');
  if (video) video.srcObject = null;
  streaming = false;
  setLive(false);
  document.getElementById('viewer').removeEventListener('click', handleViewerTap);
  showScreen('login');
}

// ════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setStatus(html) {
  const el = document.getElementById('status-overlay');
  if (html) { el.innerHTML = html; el.classList.remove('hidden'); }
  else       { el.classList.add('hidden'); }
}

function setLive(on) {
  document.getElementById('live-dot').classList.toggle('on', on);
  document.getElementById('live-label').textContent = on ? 'AO VIVO' : 'OFFLINE';
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}

// Auto-esconde controles ao assistir
function handleViewerTap() {
  if (!streaming) return;
  clearTimeout(controlsTimer);
  document.getElementById('hud-bottom').classList.remove('hidden');
  document.getElementById('tap-hint').classList.remove('show');
  scheduleHideControls();
}

function scheduleHideControls() {
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => {
    document.getElementById('hud-bottom').classList.add('hidden');
    document.getElementById('tap-hint').classList.add('show');
  }, 4000);
}

// ── Teclado: Enter no formulário ───────────────────────────────
document.getElementById('inp-room').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-pass').focus();
});
document.getElementById('inp-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});
</script>
</body>
</html>
